<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portafolio de Tareas</title>

<style>

body{
    font-family: Arial, sans-serif;
    margin:40px;
    background:#f5f5f5;
}

.container{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

h1{
    color:#333;
}

ul{
    list-style:none;
    padding:0;
}

li{
    padding:10px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:5px;
}

a{
    color:blue;
    text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<h1>Portafolio de Tareas</h1>

<p><strong>Nombre:</strong> Luis Humberto Rojas Montoya</p>
<p><strong>Matrícula:</strong> 24040444</p>
<p><strong>Grupo:</strong> ISOF02</p>

<hr>

<h2>Mis tareas</h2>

<ul id="listaTareas"></ul>

</div>

<script>

fetch("http://localhost:3000/tareas")
.then(response => response.json())
.then(data => {

    const lista = document.getElementById("listaTareas");

    data.forEach(tarea => {

        const li = document.createElement("li");

        li.innerHTML = `
            <strong>${tarea.titulo}</strong><br>
            <a href="${tarea.url}" target="_blank">
                Abrir tarea
            </a>
        `;

        lista.appendChild(li);

    });

})
.catch(error => {
    console.error(error);
});

</script>

</body>
</html>
